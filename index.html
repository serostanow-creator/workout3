<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fit Timer Pro v2.2</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg: #05080f;
      --card: rgba(255, 255, 255, 0.04);
      --accent: #0ea5e9;
      --work: #10b981;
      --rest: #3b82f6;
      --text: #ffffff;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(circle at top right, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      transition: background-color 0.8s ease;
    }

    body.phase-work { background-color: #061a14; background-image: radial-gradient(circle at top right, #064e3b, #061a14); }
    body.phase-rest { background-color: #0a1529; background-image: radial-gradient(circle at top right, #1e3a8a, #0a1529); }

    .container { max-width: 500px; margin: 0 auto; padding: 24px 20px calc(60px + env(safe-area-inset-bottom)); }

    header { margin-bottom: 32px; padding-top: 20px; }
    h1 { font-size: 34px; margin: 0; font-weight: 850; letter-spacing: -1px; }
    .subtitle { color: var(--muted); font-size: 15px; margin-top: 6px; }

    .list { display: flex; flex-direction: column; gap: 16px; }
    .card { 
      background: var(--card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 24px;
    }
    .card h3 { margin: 0 0 8px; font-size: 22px; color: #fff; }
    .card-info { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    
    .btn { border: 0; border-radius: 18px; padding: 16px 24px; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-primary { background: white; color: black; width: 100%; }
    .btn-ghost { background: rgba(255, 255, 255, 0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
    .btn-icon { width: 56px; height: 56px; border-radius: 18px; }

    .top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .overall-progress { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.1); z-index: 100; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.5s; width: 0%; }

    .timer-display { position: relative; width: 260px; height: 260px; margin: 10px auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .svg-timer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
    .svg-timer circle { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
    .circle-bg { stroke: rgba(255,255,255,0.05); }
    .circle-prog { stroke: var(--accent); stroke-dasharray: 880; stroke-dashoffset: 0; }

    .time-val { font-size: 72px; font-weight: 850; font-variant-numeric: tabular-nums; letter-spacing: -2px; }
    .phase-txt { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: var(--muted); margin-bottom: -5px; }

    .ex-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 6px; line-height: 1.2; }
    .ex-sub { font-size: 15px; color: var(--muted); text-align: center; margin-bottom: 20px; }

    .controls-row { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 30px; }
    .btn-main-play { flex: 1; height: 56px; border-radius: 18px; text-transform: uppercase; }

    .upcoming-section { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
    .upcoming-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
    .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
    .up-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    .up-item.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .up-name { font-weight: 600; flex: 1; margin-right: 10px; }
    .up-sets { font-size: 11px; font-weight: 800; opacity: 0.6; }

    .hidden { display: none !important; }
    .badge { background: var(--accent); color: black; padding: 6px 12px; border-radius: 10px; font-size: 13px; font-weight: 800; }
  </style>
</head>
<body id="body">

  <div class="overall-progress"><div class="progress-fill" id="totalBar"></div></div>

  <div class="container" id="mainScreen">
    <header>
      <h1>Тренировки</h1>
      <div class="subtitle">Работа 45с / Отдых 90с</div>
    </header>
    <div id="workoutList" class="list"></div>
  </div>

  <div class="container hidden" id="runScreen">
    <div class="top-nav">
      <button class="btn btn-ghost" style="padding: 8px 14px; font-size: 14px;" onclick="stopWorkout()">Выход</button>
      <div id="progressBadge" class="badge">1 / 7</div>
    </div>

    <div class="ex-title" id="exName">Упражнение</div>
    <div class="ex-sub" id="setInfo">Подход 1 из 4</div>

    <div class="timer-display">
      <svg class="svg-timer" viewBox="0 0 300 300">
        <circle class="circle-bg" cx="150" cy="150" r="140"></circle>
        <circle class="circle-prog" id="timerCircle" cx="150" cy="150" r="140"></circle>
      </svg>
      <div class="phase-txt" id="phaseLabel">Работа</div>
      <div class="time-val" id="timeLeft">00:45</div>
    </div>

    <div class="controls-row">
      <button class="btn btn-ghost btn-icon" onclick="engine.reset()">🔄</button>
      <button class="btn btn-primary btn-main-play" id="playBtn" onclick="engine.toggle()">ПАУЗА</button>
      <button class="btn btn-ghost btn-icon" onclick="engine.skip()">➡</button>
    </div>

    <div class="upcoming-section">
      <div class="upcoming-label">План тренировки</div>
      <div id="upcomingList" class="upcoming-list"></div>
    </div>
  </div>

<script>
  const WORK_TIME = 45;
  const REST_TIME = 90;

  const DATA = [
    {
      name: "Понедельник (A)",
      desc: "Ширина спины и верх груди",
      ex: [
        { name: "Подтягивания классические", sets: 4 },
        { name: "Отжимания (ноги на диване)", sets: 4 },
        { name: "Тяга гантели в наклоне", sets: 4 },
        { name: "Тяга гантелей к подбородку", sets: 4 },
        { name: "Скручивания на полу", sets: 3 },
        { name: "Эспандер кистевой", sets: 3 },
        { name: "Вис на турнике", sets: 2 }
      ]
    },
    {
      name: "Среда (B)",
      desc: "Ноги, бицепс, мощная грудь",
      ex: [
        { name: "Подтягивания обр. хватом", sets: 4 },
        { name: "Жим гантелей на полу", sets: 4 },
        { name: "Болгарские приседания", sets: 4 },
        { name: "Тяга в наклоне к груди", sets: 4 },
        { name: "Планка классическая", sets: 3 },
        { name: "Вис на турнике", sets: 2 }
      ]
    },
    {
      name: "Пятница (C)",
      desc: "Трицепс и задняя поверхность бедра",
      ex: [
        { name: "Подтягивания (любой хват)", sets: 4 },
        { name: "Отжимания (Алмазные)", sets: 4 },
        { name: "Румынская тяга с гантелями", sets: 4 },
        { name: "Молот на бицепс", sets: 3 },
        { name: "Подъем ног в висе", sets: 3 },
        { name: "Эспандер кистевой", sets: 3 },
        { name: "Вис на турнике", sets: 2 }
      ]
    }
  ];

  let engine = null;

  function initMain() {
    const list = document.getElementById('workoutList');
    list.innerHTML = '';
    DATA.forEach((w, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>${w.name}</h3>
        <div class="card-info">${w.desc}</div>
        <button class="btn btn-primary" onclick="startWorkout(${idx})">Начать тренировку</button>
      `;
      list.appendChild(card);
    });
  }

  function startWorkout(idx) {
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('runScreen').classList.remove('hidden');
    engine = new TimerEngine(DATA[idx]);
    engine.toggle();
  }

  function stopWorkout() {
    if (confirm('Завершить?')) location.reload();
  }

  class TimerEngine {
    constructor(workout) {
      this.workout = workout;
      this.exIdx = 0;
      this.setIdx = 1;
      this.phase = 'prepare'; 
      this.timeLeft = 5;
      this.isRunning = false;
      this.timer = null;
      this.audioCtx = null;
      this.totalSteps = workout.ex.reduce((acc, ex) => acc + (ex.sets * 2), 0);
      this.currentStep = 0;
      this.updateUI();
    }

    toggle() {
      if (this.isRunning) {
        this.stop();
      } else {
        if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.isRunning = true;
        this.timer = setInterval(() => this.tick(), 1000);
        document.getElementById('playBtn').textContent = 'ПАУЗА';
      }
    }

    stop() {
      this.isRunning = false;
      clearInterval(this.timer);
      document.getElementById('playBtn').textContent = 'ПУСК';
    }

    reset() {
      this.timeLeft = this.phase === 'work' ? WORK_TIME : (this.phase === 'prepare' ? 5 : REST_TIME);
      this.updateUI();
    }

    skip() { this.nextPhase(); }

    tick() {
      if (this.timeLeft > 0) {
        this.timeLeft--;
        if (this.timeLeft <= 3 && this.timeLeft > 0) this.beep(600, 0.1);
        if (this.timeLeft === 0) this.beep(880, 0.4);
      } else {
        this.nextPhase();
      }
      this.updateUI();
    }

    // ЛОГИКА ГОЛОСА И ПЕРЕКЛЮЧЕНИЯ
    nextPhase() {
      const currentEx = this.workout.ex[this.exIdx];
      this.currentStep++;

      if (this.phase === 'prepare' || this.phase === 'rest') {
        // ПЕРЕХОД К РАБОТЕ
        this.phase = 'work';
        this.timeLeft = WORK_TIME;
        this.speak(`Подход ${this.setIdx} из ${currentEx.sets}`);
      } else {
        // ПЕРЕХОД К ОТДЫХУ
        if (this.setIdx < currentEx.sets) {
          // Следующий подход того же упражнения
          this.setIdx++;
          this.phase = 'rest';
          this.timeLeft = REST_TIME;
          this.speak("Отдых. Дальше: тот же подход.");
        } else if (this.exIdx < this.workout.ex.length - 1) {
          // Следующее упражнение
          this.exIdx++;
          this.setIdx = 1;
          this.phase = 'rest';
          this.timeLeft = REST_TIME;
          this.speak(`Отдых. Дальше: ${this.workout.ex[this.exIdx].name}`);
        } else {
          this.finish();
        }
      }
    }

    finish() {
      this.stop();
      this.speak("Тренировка завершена. Молодец!");
      setTimeout(() => location.reload(), 3000);
    }

    updateUI() {
      const currentEx = this.workout.ex[this.exIdx];
      const body = document.getElementById('body');
      const circle = document.getElementById('timerCircle');
      
      document.getElementById('exName').textContent = currentEx.name;
      document.getElementById('setInfo').textContent = `Подход ${this.setIdx} из ${currentEx.sets}`;
      document.getElementById('progressBadge').textContent = `${this.exIdx + 1} / ${this.workout.ex.length}`;
      
      const totalPerc = (this.currentStep / this.totalSteps) * 100;
      document.getElementById('totalBar').style.width = totalPerc + '%';

      if (this.phase === 'work') {
        body.className = 'phase-work';
        document.getElementById('phaseLabel').textContent = 'Работа';
        circle.style.stroke = '#10b981';
      } else {
        body.className = 'phase-rest';
        document.getElementById('phaseLabel').textContent = (this.phase==='prepare') ? 'Готовься' : 'Отдых';
        circle.style.stroke = '#3b82f6';
      }

      const m = Math.floor(this.timeLeft / 60);
      const s = this.timeLeft % 60;
      document.getElementById('timeLeft').textContent = `${m}:${s.toString().padStart(2, '0')}`;
      
      let totalForPhase = this.phase === 'work' ? WORK_TIME : (this.phase === 'prepare' ? 5 : REST_TIME);
      let offset = 880 - (this.timeLeft / totalForPhase) * 880;
      circle.style.strokeDashoffset = offset;

      this.renderUpcoming();
    }

    renderUpcoming() {
      const container = document.getElementById('upcomingList');
      container.innerHTML = '';
      for (let i = this.exIdx; i < Math.min(this.exIdx + 3, this.workout.ex.length); i++) {
        const ex = this.workout.ex[i];
        const item = document.createElement('div');
        item.className = `up-item ${i === this.exIdx ? 'active' : ''}`;
        let setsText = `${ex.sets} подходов`;
        if (i === this.exIdx) setsText = `Осталось: ${ex.sets - this.setIdx + 1}`;
        item.innerHTML = `<div class="up-name">${ex.name}</div><div class="up-sets">${setsText}</div>`;
        container.appendChild(item);
      }
    }

    beep(freq, dur) {
      if (!this.audioCtx) return;
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.connect(gain); gain.connect(this.audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + dur);
      osc.start(); osc.stop(this.audioCtx.currentTime + dur);
    }

    speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); // Остановить текущую речь, если есть
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'ru-RU';
      msg.rate = 1.0;
      window.speechSynthesis.speak(msg);
    }
  }

  initMain();
</script>
</body>
</html>
